name: Update Data Screener Otomatis

on:
  schedule:
    # Jalan tiap 5 menit, HANYA jam 02:00 - 09:00 UTC (09:00 - 16:00 WIB), HANYA hari Senin-Jumat
    - cron: '*/5 2-9 * * 1-5'
  workflow_dispatch: # Mengizinkan Anda menekan tombol jalankan manual di web GitHub

# WAJIB: Memberikan izin agar GitHub Action Bot bisa melakukan 'git push' menyimpan CSV ke repo
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy

      - name: Run update script
        run: python update_data.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add hasil_screener.csv
          # Menyimpan hasil, abaikan jika tidak ada perubahan
          git commit -m "Auto-update data saham" || echo "Tidak ada perubahan data"
          git push